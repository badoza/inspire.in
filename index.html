<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspire Basketball Academy</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#F26522">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandPrimary: '#F26522',
                        brandSecondary: '#0B132B',
                        brandLight: '#F8FAFC',
                        brandAccent: '#FFD700'
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8FAFC; color: #0B132B; -webkit-font-smoothing: antialiased; padding-bottom: 80px; }
        .clip-slant { clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%); }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .tab-content { display: none; animation: fadeIn 0.4s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .modal-body { transform: scale(0.95); transition: transform 0.3s ease; }
        .active-modal .modal-body { transform: scale(1); }
    </style>
</head>
<body class="font-sans">

    <header class="fixed w-full top-0 z-40 bg-white/95 backdrop-blur-md shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brandPrimary rounded-xl flex items-center justify-center text-white font-black text-xl shadow-md rotate-3">I</div>
                <div class="flex flex-col">
                    <span class="font-black text-lg tracking-tight text-brandSecondary leading-none uppercase">Inspire</span>
                    <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Basketball Academy</span>
                </div>
            </div>
            <div class="text-[9px] text-gray-500 font-bold bg-gray-100 px-3 py-1.5 rounded-full uppercase tracking-wider">
                Dev: Kunal Dongare
            </div>
        </div>
    </header>

    <div id="install-banner" class="fixed bottom-20 left-4 right-4 z-50 bg-brandSecondary text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center hidden border border-brandPrimary/30">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-brandPrimary rounded-xl flex items-center justify-center text-white font-black">I</div>
            <div>
                <h4 class="font-black text-sm">Install Inspire App</h4>
                <p class="text-[10px] text-gray-400">Get native access & offline schedules</p>
            </div>
        </div>
        <button id="install-btn" class="bg-brandPrimary text-white font-black text-xs px-4 py-2 rounded-lg">INSTALL</button>
        <button onclick="document.getElementById('install-banner').classList.add('hidden')" class="text-gray-400 ml-2"><i class="fas fa-times"></i></button>
    </div>

    <div id="enroll-modal" class="fixed inset-0 z-50 hidden bg-brandSecondary/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="modal-body bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl relative">
            <button onclick="closeModal('enroll-modal')" class="absolute top-4 right-4 text-gray-400 hover:text-brandSecondary text-2xl"><i class="fas fa-times"></i></button>
            <h2 class="text-2xl font-black text-brandSecondary mb-1 uppercase">Join The Squad</h2>
            
            <form action="https://api.web3forms.com/submit" method="POST" class="space-y-4 mt-6">
                <input type="hidden" name="access_key" value="AIzaSyCcoRV-OI6x6ucFsu6t0Y0l72iLMOl63CI">
                <input type="hidden" name="subject" value="New Academy Enrollment!">
                
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Player Name</label>
                    <input type="text" name="name" required class="w-full mt-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-brandPrimary focus:ring-1 focus:ring-brandPrimary">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">Age</label>
                        <input type="number" name="age" required class="w-full mt-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-brandPrimary">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">Phone Number</label>
                        <input type="tel" name="phone" required class="w-full mt-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-brandPrimary">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Select Batch</label>
                    <select name="batch" class="w-full mt-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:border-brandPrimary">
                        <option>Morning Drill (6 AM - 8 AM)</option>
                        <option>Junior Squad (4:30 PM - 6 PM)</option>
                        <option>Senior Elite (6 PM - 8 PM)</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-brandSecondary text-white font-black py-4 rounded-xl shadow-lg mt-4 hover:bg-brandPrimary transition-colors uppercase tracking-wider">
                    Submit Application
                </button>
            </form>
        </div>
    </div>

    <div id="news-modal" class="fixed inset-0 z-50 hidden bg-brandSecondary/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="modal-body bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl relative flex flex-col max-h-[85vh]">
            <button onclick="closeModal('news-modal')" class="absolute top-4 right-4 text-white bg-black/50 w-8 h-8 rounded-full z-10 flex items-center justify-center"><i class="fas fa-times"></i></button>
            <div id="news-modal-img" class="w-full h-48 bg-gray-200 flex-shrink-0"></div>
            <div class="p-6 overflow-y-auto">
                <span id="news-modal-date" class="text-brandPrimary text-[10px] font-black uppercase tracking-wider"></span>
                <h2 id="news-modal-title" class="text-xl font-black text-brandSecondary mt-1 mb-4 leading-snug"></h2>
                <div id="news-modal-desc" class="text-sm text-gray-600 font-medium mb-6 space-y-3"></div>
                <a id="news-modal-link" href="#" target="_blank" class="block text-center w-full bg-gray-100 text-brandSecondary font-bold py-3 rounded-xl hover:bg-brandPrimary hover:text-white transition-colors text-sm uppercase">Read Full Article on ESPN</a>
            </div>
        </div>
    </div>

    <div class="pt-16 max-w-md mx-auto md:max-w-7xl md:px-4">

        <main id="tab-home" class="tab-content active">
            <section class="relative pt-12 pb-24 px-4 bg-brandSecondary clip-slant overflow-hidden md:rounded-b-3xl">
                <div class="absolute inset-0 opacity-30 bg-[url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=1000&auto=format&fit=crop')] bg-cover bg-center mix-blend-luminosity"></div>
                <div class="relative z-10 text-center mt-4">
                    <span class="inline-block bg-brandPrimary/20 text-brandPrimary border border-brandPrimary/50 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest mb-4">Admissions Open 2026</span>
                    <h1 class="text-5xl md:text-7xl font-black text-white mb-4 tracking-tighter uppercase drop-shadow-xl">
                        Forge Your <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-brandPrimary to-brandAccent">Legacy</span>
                    </h1>
                    <button onclick="document.getElementById('enroll-modal').classList.remove('hidden')" class="mt-6 bg-brandPrimary text-white font-black px-10 py-4 rounded-full shadow-lg hover:scale-105 transition-transform uppercase tracking-widest">
                        Join The Academy
                    </button>
                </div>
            </section>
        </main>

        <main id="tab-news" class="tab-content py-6 px-4">
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-3xl font-black text-brandSecondary uppercase flex items-center gap-3">
                    <i class="fas fa-bolt text-brandPrimary"></i> Live News
                </h2>
            </div>
            <div id="news-container" class="space-y-4"></div>
        </main>
        
        <main id="tab-batches" class="tab-content py-6 px-4">
            <h2 class="text-3xl font-black text-brandSecondary uppercase mb-6 flex items-center gap-3"><i class="fas fa-stopwatch text-brandPrimary"></i> Schedules</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="bg-white rounded-3xl p-6 shadow-lg border-b-4 border-brandPrimary">
                    <h3 class="text-2xl font-black text-brandSecondary mb-1">Morning Drill</h3>
                    <div class="bg-brandLight p-4 rounded-2xl flex justify-between items-center mb-5 mt-4">
                        <span class="font-black text-brandSecondary text-sm">6:00 - 8:00 AM</span>
                        <span class="font-bold text-gray-500 text-xs">Mon - Fri</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-40 pb-safe">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto">
            <button onclick="switchTab('home')" id="nav-home" class="nav-btn active flex flex-col items-center justify-center w-full h-full text-brandPrimary">
                <i class="fas fa-home text-xl mb-1"></i><span class="text-[9px] font-black uppercase">Home</span>
            </button>
            <button onclick="switchTab('batches')" id="nav-batches" class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400">
                <i class="fas fa-stopwatch text-xl mb-1"></i><span class="text-[9px] font-black uppercase">Batches</span>
            </button>
            <button onclick="switchTab('news')" id="nav-news" class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400">
                <i class="fas fa-newspaper text-xl mb-1"></i><span class="text-[9px] font-black uppercase">News</span>
            </button>
        </div>
    </nav>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => { btn.classList.remove('text-brandPrimary'); btn.classList.add('text-gray-400'); });
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.remove('text-gray-400');
            document.getElementById('nav-' + tabId).classList.add('text-brandPrimary');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // --- PWA INSTALL LOGIC ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-banner').classList.add('hidden');
                deferredPrompt = null;
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        // --- NEWS LOGIC WITH MODAL ---
        const RSS_URL = 'https://www.espn.com/espn/rss/nba/news';
        const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;
        let globalNewsData = [];

        async function fetchSportsNews() {
            const container = document.getElementById('news-container');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if(data.status === 'ok') {
                    globalNewsData = data.items.slice(0, 10); 
                    globalNewsData.forEach((item, index) => {
                        let imgUrl = 'https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=500&auto=format&fit=crop'; 
                        if (item.enclosure && item.enclosure.link) imgUrl = item.enclosure.link;
                        else {
                            const match = item.description.match(/<img[^>]+src="([^">]+)"/);
                            if(match && match[1]) imgUrl = match[1];
                        }
                        const date = new Date(item.pubDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        
                        // Pass the index to the click handler
                        const articleHTML = `
                            <div onclick="openNewsModal(${index}, '${imgUrl}')" class="bg-white rounded-2xl p-3 shadow-sm border border-gray-100 flex gap-4 items-center cursor-pointer active:scale-95 transition-transform">
                                <div class="w-24 h-24 rounded-xl overflow-hidden flex-shrink-0 bg-gray-100">
                                    <img src="${imgUrl}" class="w-full h-full object-cover">
                                </div>
                                <div class="flex flex-col py-1">
                                    <span class="text-brandPrimary text-[10px] font-black uppercase mb-1 tracking-wider">${date}</span>
                                    <h3 class="text-brandSecondary font-bold text-sm leading-snug line-clamp-2">${item.title}</h3>
                                </div>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', articleHTML);
                    });
                }
            } catch (error) {
                container.innerHTML = "<p>Error loading news.</p>";
            }
        }

        // Populates and opens the news modal
        function openNewsModal(index, imgUrl) {
            const item = globalNewsData[index];
            const date = new Date(item.pubDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            
            // Strip HTML tags from description for a clean paragraph
            let cleanDesc = item.description.replace(/<\/?[^>]+(>|$)/g, "");
            
            document.getElementById('news-modal-img').innerHTML = `<img src="${imgUrl}" class="w-full h-full object-cover">`;
            document.getElementById('news-modal-date').innerText = date;
            document.getElementById('news-modal-title').innerText = item.title;
            document.getElementById('news-modal-desc').innerText = cleanDesc || "No further details provided in the live feed.";
            document.getElementById('news-modal-link').href = item.link;
            
            document.getElementById('news-modal').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', fetchSportsNews);
    </script>
</body>
</html>
